function calcValue(c) {
  return Math.round((c.buyer*0.40 + c.volume*0.20 + c.conversion*0.15 + c.quality*0.10 + c.strategic*0.10 + c.brand*0.05)*10);
}
function calcCost(c) {
  return c.costs.reduce((a,x)=>a+x.v,0) + Math.round((c.booth.min+c.booth.max)/2);
}
function calcRating(c) {
  const cost = calcCost(c);
  if (cost < 200) return 999;
  return Math.round(calcValue(c) / (cost/1000) * 10) / 10;
}
function getTier(c) {
  const r = calcRating(c), v = calcValue(c);
  if (r >= 20 || (r >= 15 && v >= 60)) return "go";
  if (r >= 8 || v >= 70) return "consider";
  return "skip";
}
function audienceBadge(buyer) {
  if (buyer >= 9) return {label:"#1 Children's Min.",bg:"bg-green-100",text:"text-green-800"};
  if (buyer >= 7) return {label:"#2 Church Planters",bg:"bg-blue-100",text:"text-blue-800"};
  if (buyer >= 4) return {label:"#3 Church Admins",bg:"bg-yellow-100",text:"text-yellow-800"};
  return {label:"#4 Tech/IT",bg:"bg-red-100",text:"text-red-800"};
}
function confIcon(c) {
  if (c==="confirmed"||c==="searched") return {icon:"✅",label:"Confirmed"};
  if (c==="partial") return {icon:"📧",label:"Partial — request prospectus"};
  return {icon:"~",label:"Estimated"};
}
function fmtDate(ds, de) {
  const a = new Date(ds), b = new Date(de);
  const mo = a.toLocaleString("en-US",{month:"short"});
  if (ds===de) return `${mo} ${a.getDate()}, ${a.getFullYear()}`;
  return `${mo} ${a.getDate()}–${b.getDate()}, ${a.getFullYear()}`;
}
function kiwiUrl(conf) {
  const orig = conf.flightOrigin.toLowerCase();
  const dest = (conf.nearestAirport||"").toLowerCase();
  if (!dest) return null;
  return `https://www.kiwi.com/en/search/results/${orig}/${dest}/${conf.kiwiOut}/${conf.kiwiBack}`;
}
function hotelUrl(conf) {
  const city = encodeURIComponent(conf.city+", "+conf.state);
  return `https://www.google.com/travel/hotels/s/${city}`;
}
function bookingUrl(conf) {
  return `https://www.booking.com/searchresults.html?ss=${encodeURIComponent(conf.city)}&checkin=${conf.dateStart}&checkout=${conf.dateEnd}&group_adults=2&no_rooms=2`;
}
function calUrl(conf) {
  const start = conf.dateStart.replace(/-/g,"");
  const end = conf.dateEnd.replace(/-/g,"");
  const title = encodeURIComponent(conf.name+" — G4K Exhibit");
  const loc = encodeURIComponent(conf.venue);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&location=${loc}`;
}

                <div className="flex items-center gap-2 mb-1">
                  <span className="font-medium text-sm text-gray-800">{d.label}</span>
                  <span className="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-semibold">{conf[d.k]}/10</span>
                  <span className="text-xs text-gray-400">weight {d.w}</span>
                </div>
                <p className="text-sm text-gray-600">{args[d.k] || "No reasoning available."}</p>
              </div>
            ))}
          </div>
        )}

        {/* Book It panel */}
        {panel==="book" && (
          <div>
            <h4 className="font-semibold text-gray-800 mb-3">Book It — {conf.name}</h4>
            {conf.booth.sponsorship && (
              <div className="mb-3 px-3 py-2 bg-orange-50 border border-orange-200 rounded text-sm text-orange-800">
                ⚠️ <strong>Sponsorship model:</strong> Application required. Contact {conf.booth.contact}.
              </div>
            )}
            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2">
              <a href={conf.booth.contactUrl} target="_blank" rel="noopener noreferrer"
                className="flex items-center gap-2 px-3 py-2 bg-green-600 text-white rounded text-sm font-medium hover:bg-green-700">
                🎪 Exhibitor Info
              </a>
              <a href={conf.url} target="_blank" rel="noopener noreferrer"
                className="flex items-center gap-2 px-3 py-2 bg-blue-600 text-white rounded text-sm font-medium hover:bg-blue-700">
                🌐 Conference Site
              </a>
              {kiwi && (
                <a href={kiwi} target="_blank" rel="noopener noreferrer"
                  className="flex items-center gap-2 px-3 py-2 bg-orange-500 text-white rounded text-sm font-medium hover:bg-orange-600">
                  ✈️ Kiwi Flights ({conf.flightOrigin}→{conf.nearestAirport})
                </a>
              )}
              <a href={hotelUrl(conf)} target="_blank" rel="noopener noreferrer"
                className="flex items-center gap-2 px-3 py-2 bg-indigo-600 text-white rounded text-sm font-medium hover:bg-indigo-700">
                🏨 Google Hotels
              </a>
              <a href={bookingUrl(conf)} target="_blank" rel="noopener noreferrer"
                className="flex items-center gap-2 px-3 py-2 bg-blue-700 text-white rounded text-sm font-medium hover:bg-blue-800">
                🛏️ Booking.com
              </a>
              <a href={calUrl(conf)} target="_blank" rel="noopener noreferrer"
                className="flex items-center gap-2 px-3 py-2 bg-red-600 text-white rounded text-sm font-medium hover:bg-red-700">
                📅 Add to Calendar
              </a>
            </div>
            <div className="mt-4 text-sm text-gray-700">
              <strong>Travel schedule:</strong>
              <div className="mt-1 space-y-0.5 text-gray-600">
                <div>📅 {conf.kiwiOut} — Travel day ({conf.flightOrigin} → {conf.city})</div>
                <div>📅 {conf.dateStart} – {conf.dateEnd} — Event days</div>
                <div>📅 {conf.kiwiBack} — Return day ({conf.city} → {conf.flightOrigin})</div>
              </div>
            </div>
            {conf.flightOrigin==="AMS" && (
              <div className="mt-3 text-xs text-gray-500 bg-blue-50 rounded p-2">
                🇪🇺 Flying from Europe: Check both <strong>AMS</strong> (Amsterdam) and <strong>MAN</strong> (Manchester) for best fares. MAN often cheaper for Andy from Leeds.
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <div className="bg-white border-b border-gray-200 px-6 py-4">
        <div className="max-w-7xl mx-auto">
          <div className="flex items-center justify-between mb-2">
            <div>
              <h1 className="text-2xl font-bold text-gray-900">G4K Exhibition Finder</h1>
              <p className="text-sm text-gray-500">Givt4Kids — Church conference exhibition planner</p>
            </div>
            <div className="text-right text-xs text-gray-400">
              <div>Flight origins: <strong>Before Jul 2026</strong> = TUL | <strong>Jul 2026+</strong> = AMS/MAN</div>
              <div>🟢 Go = Rating ≥20 or (≥15 + value ≥60) | 🟡 Consider = Rating ≥8 or value ≥70</div>
            </div>
          </div>
          {/* Buyer profile */}
          <div className="flex flex-wrap gap-2 mt-2 text-xs">
            <span className="bg-green-100 text-green-800 px-2 py-1 rounded-full font-medium">#1 Children's Ministry Leaders — 10/10</span>
            <span className="bg-blue-100 text-blue-800 px-2 py-1 rounded-full font-medium">#2 Church Planters — 7–8/10</span>
            <span className="bg-yellow-100 text-yellow-800 px-2 py-1 rounded-full font-medium">#3 Church Admins — 4–6/10</span>
            <span className="bg-red-100 text-red-800 px-2 py-1 rounded-full font-medium">#4 Tech/IT Staff — 1–3/10</span>
          </div>
        </div>
      </div>

      {/* Stats bar */}
      <div className="bg-white border-b border-gray-100 px-6 py-2">
        <div className="max-w-7xl mx-auto flex flex-wrap gap-4 text-sm">
          <span className="text-gray-600">{active.filter(c=>!c.pastEvent).length} active events</span>
          <span className="text-green-700 font-medium">🟢 {goCount} Go</span>
          <span className="text-yellow-700 font-medium">🟡 {considerCount} Consider</span>
          <span className="text-red-700 font-medium">🔴 {skipCount} Skip</span>
          <span className="text-gray-500">Avg cost: ${avgCost.toLocaleString()}</span>
          {dismissed.length > 0 && (
            <button onClick={()=>setShowDismissed(s=>!s)} className="text-gray-400 hover:text-gray-600 underline">
              {showDismissed?"Hide":"Show"} hidden ({dismissed.length})
            </button>
          )}
        </div>
      </div>

      {/* Error toast */}
      {dismissError && (
        <div className="mx-6 mt-2 px-4 py-2 bg-red-100 border border-red-300 text-red-700 rounded text-sm max-w-7xl">
          ⚠️ {dismissError}
        </div>
      )}

      {/* Filters */}
      <div className="px-6 py-3 bg-white border-b border-gray-200">
        <div className="max-w-7xl mx-auto flex flex-wrap gap-3 items-center">
          <div className="flex gap-1">
            {[["all","All"],["go","🟢 Go only"],["goConsider","🟢+🟡 Go/Consider"]].map(([v,l])=>(
              <button key={v} onClick={()=>setTierFilter(v)}
                className={`px-3 py-1.5 rounded text-sm font-medium transition-colors ${tierFilter===v?"bg-blue-600 text-white":"bg-gray-100 text-gray-700 hover:bg-gray-200"}`}>{l}</button>
            ))}
          </div>
          <div className="flex items-center gap-2">
            <label className="text-sm text-gray-600">Max budget:</label>
            <select className="text-sm border border-gray-300 rounded px-2 py-1" value={maxBudget} onChange={e=>setMaxBudget(Number(e.target.value))}>
              <option value={1000}>$1,000</option>
              <option value={3000}>$3,000</option>
              <option value={5000}>$5,000</option>
              <option value={8000}>$8,000</option>
              <option value={10000}>$10,000</option>
              <option value={99999}>No limit</option>
            </select>
          </div>
          <label className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
            <input type="checkbox" checked={showPast} onChange={e=>setShowPast(e.target.checked)} className="rounded" />
            Show past/sold-out events
          </label>
        </div>
      </div>

      {/* Table */}
      <div className="px-6 py-4 max-w-7xl mx-auto overflow-x-auto">
        <table className="w-full bg-white rounded-lg shadow-sm border border-gray-200 text-sm">
          <thead>
            <tr className="bg-gray-50 border-b border-gray-200">
              {[
                ["name","Conference"],
                ["dateStart","Dates"],
                ["location","Location"],
                ["audience","Audience"],
                ["attendance","Att."],
                ["totalCost","Total Cost"],
                ["value","Value"],
                ["rating","Rating"],
                ["tier","Tier"],
              ].map(([col,label])=>(
                <th key={col} onClick={()=>toggleSort(col)}
                  className="px-3 py-2.5 text-left font-semibold text-gray-700 cursor-pointer hover:bg-gray-100 whitespace-nowrap">
                  {label}<SortIcon col={col}/>
                </th>
              ))}
              <th className="px-3 py-2.5 text-left font-semibold text-gray-700">Actions</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(conf=>{
              const badge = audienceBadge(conf.buyer);
              const isExpanded = expandedRow===conf.name;
              return (
                <React.Fragment key={conf.name}>
                  <tr className={`border-b border-gray-100 hover:bg-gray-50 transition-colors ${conf.pastEvent?"opacity-60":""} ${conf.local?"bg-green-50":""}`}>
                    <td className="px-3 py-2.5">
                      <div className="flex items-center gap-2">
                        <button onClick={()=>setExpandedRow(isExpanded?null:conf.name)}
                          className="text-gray-400 hover:text-blue-600 text-lg leading-none">{isExpanded?"▼":"▶"}</button>
                        <a href={conf.url} target="_blank" rel="noopener noreferrer"
                          className="font-medium text-blue-700 hover:underline">{conf.name}</a>
                        {conf.local && <span className="text-xs bg-green-200 text-green-800 px-1 rounded">LOCAL</span>}
                        {conf.pastEvent && <span className="text-xs bg-gray-200 text-gray-600 px-1 rounded">PAST</span>}
                      </div>
                    </td>
                    <td className="px-3 py-2.5 whitespace-nowrap text-gray-600">{fmtDate(conf.dateStart,conf.dateEnd)}</td>
                    <td className="px-3 py-2.5 text-gray-600">{conf.location}</td>
                    <td className="px-3 py-2.5">
                      <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${badge.bg} ${badge.text}`}>{badge.label}</span>
                    </td>
                    <td className="px-3 py-2.5 text-gray-600 whitespace-nowrap">
                      {conf.attendance.toLocaleString()} {conf.attConf?"✅":"~"}
                    </td>
                    <td className="px-3 py-2.5 font-medium text-gray-800">${conf.totalCost.toLocaleString()}</td>
                    <td className="px-3 py-2.5">
                      <div className="flex items-center gap-1">
                        <div className="w-16 bg-gray-200 rounded h-2">
                          <div className="bg-blue-500 h-2 rounded" style={{width:`${conf.value}%`}}></div>
                        </div>
                        <span className="text-xs font-semibold">{conf.value}</span>
                      </div>
                    </td>
                    <td className="px-3 py-2.5 font-bold text-gray-800">
                      {conf.rating===999?"∞":conf.rating}
                    </td>
                    <td className="px-3 py-2.5"><TierBadge tier={conf.tier}/></td>
                    <td className="px-3 py-2.5">
                      <div className="flex gap-1 flex-wrap">
                        <button onClick={()=>{setExpandedRow(conf.name);setActivePanel(p=>({...p,[conf.name]:"book"}));}}
                          className="px-2 py-1 bg-green-600 text-white rounded text-xs hover:bg-green-700">🚀</button>
                        <button onClick={()=>{setExpandedRow(conf.name);setActivePanel(p=>({...p,[conf.name]:"args"}));}}
                          className="px-2 py-1 bg-blue-600 text-white rounded text-xs hover:bg-blue-700">💡</button>
                        <button onClick={()=>handleDismiss(conf.name)}
                          className="px-2 py-1 bg-gray-200 text-gray-600 rounded text-xs hover:bg-gray-300" title="Not interested">👎</button>
                      </div>
                    </td>
                  </tr>
                  {isExpanded && (
                    <tr>
                      <td colSpan={11} className="p-0">
                        <ExpandedDetail conf={conf}/>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
            {filtered.length===0 && (
              <tr><td colSpan={11} className="px-6 py-8 text-center text-gray-400">No conferences match the current filters.</td></tr>
            )}
          </tbody>
        </table>

        {/* Dismissed section */}
        {showDismissed && dismissedConfs.length>0 && (
          <div className="mt-6">
            <h3 className="text-sm font-semibold text-gray-500 mb-2">👎 Not Interested ({dismissedConfs.length})</h3>
            <div className="bg-white rounded-lg border border-gray-200 divide-y divide-gray-100">
              {dismissedConfs.map(conf=>(
                <div key={conf.name} className="flex items-center justify-between px-4 py-2">
                  <span className="text-sm text-gray-500">{conf.name} — {conf.location}</span>
                  <button onClick={()=>handleRestore(conf.name)}
                    className="px-3 py-1 text-xs bg-blue-100 text-blue-700 rounded hover:bg-blue-200">
                    Restore
                  </button>
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="mt-4 text-xs text-gray-400 text-center">
          Data as of March 2026 · Booth costs are estimated midpoints · ✅ Confirmed · ~ Estimated · 📧 Partial
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
