// ── Calc helpers ───────────────────────────────────────────────────────────────
function calcValue(c){return Math.round((c.buyer*.40+c.volume*.20+c.conversion*.15+c.quality*.10+c.strategic*.10+c.brand*.05)*10)}
function travelCost(c){return c.costs.reduce((s,x)=>s+x.v,0)}
function totalMin(c){return c.booth.min+travelCost(c)}
function totalMax(c){return c.booth.max+travelCost(c)}
function totalMid(c){return Math.round((totalMin(c)+totalMax(c))/2)}
function calcRating(v,t){return t>0?v/(t/1000):0}
function getTier(r,v){if(r>=20)return"go";if(r>=15&&v>=60)return"go";if(r>=8||v>=70)return"consider";return"skip"}
function getAR(c){if(c.buyer>=9)return 1;if(c.buyer>=7)return 2;if(c.buyer>=5)return 3;return 4}
function addD(ds,n){const d=new Date(ds+"T00:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0]}

// ── Clean date-range formatter (derived from ISO dates) ────────────────────────
function formatDateRange(start, end) {
  const s = new Date(start + "T00:00:00");
  const e = new Date(end   + "T00:00:00");
  const M = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const sm=M[s.getMonth()], em=M[e.getMonth()], sy=s.getFullYear(), ey=e.getFullYear();
  if (start===end) return `${sm} ${s.getDate()}, ${sy}`;
  if (sm===em && sy===ey) return `${sm} ${s.getDate()}–${e.getDate()}, ${sy}`;
  if (sy===ey) return `${sm} ${s.getDate()} – ${em} ${e.getDate()}, ${sy}`;
  return `${sm} ${s.getDate()}, ${sy} – ${em} ${e.getDate()}, ${ey}`;
}

                      <span style={{fontWeight:700}}>{c.value}</span><span style={{color:"#94a3b8",fontSize:10}}>/100</span>
                    </td>
                    <td style={{padding:"8px 6px",textAlign:"right",fontWeight:800,fontSize:14,color:tBd[c.tier]}}>{c.rating.toFixed(1)}</td>
                    <td style={{padding:"8px 6px"}}>
                      <span style={{padding:"2px 6px",borderRadius:5,fontSize:10,fontWeight:700,background:tBg[c.tier],color:tBd[c.tier]}}>{tL[c.tier]}</span>
                    </td>
                    <td style={{padding:"8px 4px",textAlign:"center",whiteSpace:"nowrap"}}>
                      {!c.pastEvent&&(
                        <button onClick={e=>{e.stopPropagation();setExpanded(i);setPanel(panel==="book"&&expanded===i?null:"book");}} style={{padding:"2px 6px",borderRadius:5,border:"1px solid #cbd5e1",background:panel==="book"&&expanded===i?"#2563eb":"#fff",color:panel==="book"&&expanded===i?"#fff":"#2563eb",cursor:"pointer",fontWeight:700,fontSize:10,marginRight:3}}>🚀</button>
                      )}
                      <button onClick={e=>{e.stopPropagation();setExpanded(i);setPanel(panel==="arg"&&expanded===i?null:"arg");}} style={{padding:"2px 6px",borderRadius:5,border:"1px solid #cbd5e1",background:panel==="arg"&&expanded===i?"#ca8a04":"#fff",color:panel==="arg"&&expanded===i?"#fff":"#ca8a04",cursor:"pointer",fontWeight:700,fontSize:10}}>💡</button>
                    </td>
                  </tr>

                  {isExp&&(
                    <tr key={c.name+"-detail"}>
                      <td colSpan={12} style={{padding:"12px 16px",background:"#f8fafc",borderBottom:"2px solid #e2e8f0"}}>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,maxWidth:800}}>
                          {/* Cost breakdown */}
                          <div>
                            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"#64748b",marginBottom:6}}>Cost Breakdown</div>
                            <table style={{fontSize:11,width:"100%"}}><tbody>
                              <tr>
                                <td style={{padding:"4px 0",color:bCol[c.booth.status],fontWeight:600}}>{bIcon[c.booth.status]} Booth</td>
                                <td style={{padding:"4px 0",textAlign:"right",fontWeight:600}}>{c.booth.status==="unknown"?"❌ Unknown":`$${c.booth.min.toLocaleString()}–$${c.booth.max.toLocaleString()}`}</td>
                              </tr>
                              {c.costs.map(x=>(
                                <tr key={x.l}>
                                  <td style={{padding:"3px 0",color:"#64748b"}}><span style={{color:cCol[x.c],marginRight:3}}>{cIcon[x.c]}</span>{x.l}</td>
                                  <td style={{padding:"3px 0",textAlign:"right",fontWeight:600}}>${x.v.toLocaleString()}</td>
                                </tr>
                              ))}
                              <tr style={{borderTop:"1px solid #cbd5e1"}}>
                                <td style={{padding:"5px 0 0",fontWeight:700}}>Range</td>
                                <td style={{padding:"5px 0 0",textAlign:"right",fontWeight:700}}>${c.tMin.toLocaleString()} – ${c.tMax.toLocaleString()}</td>
                              </tr>
                            </tbody></table>
                            <div style={{marginTop:6,fontSize:10,color:"#94a3b8"}}>Rating uses midpoint: ${c.tMid.toLocaleString()}</div>
                            {c.booth.note&&(
                              <div style={{marginTop:8,padding:"8px 10px",background:"#fff",borderRadius:8,border:"1px solid #e2e8f0",fontSize:11,color:"#64748b"}}>
                                <strong>Booth note:</strong> {c.booth.note}
                                {c.booth.contactUrl&&<> <a href={c.booth.contactUrl} target="_blank" rel="noreferrer" style={{color:"#2563eb"}}>→ Link</a></>}
                              </div>
                            )}
                            <div style={{marginTop:6,background:"#f1f5f9",borderRadius:8,padding:"6px 10px",fontSize:10,color:"#64748b"}}>
                              {c.costs.filter(x=>x.n).map(x=>(
                                <div key={x.l} style={{marginBottom:2}}><span style={{color:cCol[x.c]}}>{cIcon[x.c]}</span> {x.l}: {x.n}</div>
                              ))}
                            </div>
                          </div>
                          {/* Value breakdown */}
                          <div>
                            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"#64748b",marginBottom:6}}>Value Score (6 dimensions)</div>
                            <table style={{fontSize:11,width:"100%"}}><tbody>
                              {["buyer","volume","conversion","quality","strategic","brand"].map(k=>(
                                <tr key={k}>
                                  <td style={{padding:"2px 0",color:"#64748b"}}>{dL[k]} <span style={{fontSize:9,color:"#94a3b8"}}>({dW[k]})</span></td>
                                  <td style={{padding:"2px 0",textAlign:"right",fontWeight:600}}>{c[k]}/10</td>
                                </tr>
                              ))}
                              <tr style={{borderTop:"1px solid #cbd5e1"}}>
                                <td style={{padding:"4px 0 0",fontWeight:700}}>Value Score</td>
                                <td style={{padding:"4px 0 0",textAlign:"right",fontWeight:700}}>{c.value}/100</td>
                              </tr>
                            </tbody></table>
                            <div style={{marginTop:8,fontSize:11,color:"#64748b"}}>
                              <strong>Rating:</strong> {c.value} ÷ (${c.tMid.toLocaleString()} ÷ $1k) = <strong style={{color:tBd[c.tier]}}>{c.rating.toFixed(1)}</strong>
                            </div>
                          </div>
                        </div>
                        <div style={{marginTop:8,padding:"6px 10px",borderRadius:8,fontSize:11,fontWeight:600,background:aB[c.ar].bg,color:aB[c.ar].c}}>🎯 {c.audienceNote}</div>
                        <div style={{marginTop:4,padding:"6px 10px",background:"#fff",borderRadius:8,border:"1px solid #e2e8f0",fontSize:11,color:"#475569"}}>{c.notes}</div>
                        {panel==="arg"&&<ArgPanel name={c.name}/>}
                        {panel==="book"&&<BookPanel c={c}/>}
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Legend */}
      <div style={{marginTop:14,padding:"10px 14px",background:"#f1f5f9",borderRadius:10,fontSize:10,color:"#64748b"}}>
        <strong>Rating</strong> = Value ÷ (Midpoint Cost ÷ $1k). Higher = more value per dollar spent. &nbsp;|&nbsp;
        Booth: ❌ no public pricing · ⚠️ partial info · ✅ confirmed. &nbsp;|&nbsp;
        Costs: ✅ confirmed · 🔍 fare searched · ~ estimated. &nbsp;|&nbsp;
        ✈️ Kiwi links for live flight pricing. &nbsp;|&nbsp;
        🎸 Kiosk + banners in guitar case. &nbsp;|&nbsp;
        Fares researched Mar 26, 2026.
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
